PLG_TASK_UPDATENOTIFICATION="Tarefa - Notificação de Atualização"
PLG_TASK_UPDATENOTIFICATION_XML_DESCRIPTION="Esta tarefa verifica se há atualizações do Joomla e notifica os administradores."
PLG_TASK_UPDATENOTIFICATION_END="Fim da notificação de atualização"
PLG_TASK_UPDATENOTIFICATION_EMAIL_DESC="Uma lista separada por vírgulas dos endereços de e-mail que receberão os e-mails de notificação de atualização. Os endereços na lista DEVEM pertencer a usuários existentes do seu site que tenham o privilégio de Super Usuário. Se nenhum dos e-mails listados pertencer a Super Usuários, ou se for deixado em branco, todos os Super Usuários deste site receberão o e-mail de notificação de atualização."
PLG_TASK_UPDATENOTIFICATION_EMAIL_LBL="E-mails de Super Usuário"
PLG_TASK_UPDATENOTIFICATION_SEND_TITLE="Notificação de Atualização do Joomla!"
PLG_TASK_UPDATENOTIFICATION_SEND_DESC="Esta tarefa verifica periodicamente a disponibilidade de novas versões do Joomla!. Quando uma for encontrada, ela enviará um e-mail, lembrando você de atualizar. Você pode personalizar o e-mail em <a href=\"index.php?option=com_mails&view=templates&filter[extension]=plg_task_updatenotification\">Sistema &rarr; Modelos de E-mail.</a>"
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_DESC="Selecione um idioma para os e-mails de notificação de atualização. Defina como Auto para enviá-los no idioma do site no momento."
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_LBL="Idioma do E-mail"
PLG_TASK_UPDATENOTIFICATION_LANGUAGE_OVERRIDE_NONE="Auto"
PLG_TASK_UPDATENOTIFICATION_EMAIL_BODY="Este e-mail NÃO é enviado pelo projeto Joomla!. Ele é enviado automaticamente pelo seu próprio site,\n{SITENAME} - {URL} \n\n================================================================================\nINFORMAÇÕES DE ATUALIZAÇÃO\n================================================================================\n\nSeu site descobriu que há uma versão atualizada do Joomla! disponível.\n\nVersão do Joomla! instalada no momento: {CURVERSION}\nVersão do Joomla! disponível para instalação: {NEWVERSION}\n\nEste e-mail é enviado pelo seu site para lembrá-lo deste fato.\nO projeto Joomla! nunca entrará em contato diretamente sobre atualizações disponíveis do Joomla! no seu site.\n\n================================================================================\nINSTRUÇÕES DE ATUALIZAÇÃO\n================================================================================\n\nPara instalar a atualização em {SITENAME}, selecione o seguinte link. (Se o URL não for um link, copie e cole no seu navegador).\n\nLink de atualização: {LINK}\n\nNotícias do lançamento podem ser encontradas aqui: {RELEASENEWS}\n\n================================================================================\nPOR QUE ESTOU RECEBENDO ESTE E-MAIL?\n================================================================================\n\nEste e-mail foi enviado automaticamente por um plugin fornecido pelo Joomla!, o software que alimenta o seu site.\nEste plugin procura por versões atualizadas do Joomla! e envia uma notificação por e-mail aos seus administradores.\nVocê receberá vários e-mails semelhantes do seu site até atualizar o software ou desativar esses e-mails.\n\nPara desativar esses e-mails, cancele a publicação do plugin 'Tarefa - Notificação de Atualização do Joomla!' no Gerenciador de Plugins do seu site.\n\nSe você não entende o que é o Joomla! e o que precisa fazer, não entre em contato com o projeto Joomla!.\nEles NÃO estão enviando este e-mail e não podem ajudá-lo. Em vez disso, entre em contato com a pessoa que construiu ou gerencia seu site.\n\nIf you are the person who built or manages your website, please note that this plugin may have been activated automatically when you installed or updated Joomla! on your site.\n\n================================================================================\nQUEM ME ENVIOU ESTE E-MAIL?\n================================================================================\n\nEste e-mail é enviado pelo seu próprio site, {SITENAME}"
PLG_TASK_UPDATENOTIFICATION_EMAIL_SUBJECT="Atualização do Joomla! disponível para {SITENAME} — {URL}"
PLG_TASK_UPDATENOTIFICATION_MAIL_MAIL_DESC="Enviado aos administradores do site quando o plugin de tarefa &quot;Notificação de Atualização do Joomla!&quot; detecta uma atualização."
PLG_TASK_UPDATENOTIFICATION_MAIL_MAIL_TITLE="Joomla: Notificação de Atualização"
